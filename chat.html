<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>FarmX - Chat</title>
<meta name="theme-color" content="#b71c1c"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { farmx: { red: '#b71c1c', 'red-bright': '#d32f2f' } },
      fontFamily: { sans: ['Inter', 'sans-serif'] },
      fontWeight: { normal: '400', medium: '500', semibold: '600' }
    }
  }
}
</script>
<style>
body { font-family: 'Inter', sans-serif; background-color: #fafafa; }
.material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.bottom-nav-item.active { color: #b71c1c; }
.bottom-nav-item.active span { font-variation-settings: 'FILL' 1, 'wght' 500; }
.chat-message { max-width: 75%; }
.chat-message.received { align-self: flex-start; }
.chat-message.sent { align-self: flex-end; }
</style>
</head>
<body class="pb-24 text-gray-700">

<header class="bg-white sticky top-0 z-50 px-4 h-16 flex items-center justify-between border-b border-gray-200">
  <div class="flex items-center gap-3">
    <button class="p-2 rounded-full hover:bg-gray-100" onclick="window.history.back()">
      <span class="material-symbols-rounded text-farmx-red">arrow_back</span>
    </button>
    <h1 class="text-xl font-semibold text-gray-900">Chat</h1>
  </div>
  <button class="p-2 rounded-full hover:bg-gray-100">
    <span class="material-symbols-rounded text-gray-600">more_vert</span>
  </button>
</header>

<!-- Chat Container -->
<div class="flex flex-col h-[calc(100vh-8rem)]">
  <!-- Messages Area -->
  <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3">
    <!-- AI Welcome Message -->
    <div class="chat-message received bg-white p-3 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100">
      <p class="text-sm text-gray-700">Hello! I'm your FarmX AI assistant. How can I help you today? 🌾</p>
      <p class="text-[10px] text-gray-400 mt-1">Just now</p>
    </div>
  </div>

  <!-- Input Area -->
  <div class="bg-white border-t border-gray-200 p-4">
    <div class="flex items-center gap-2">
      <button class="p-2 rounded-full hover:bg-gray-100">
        <span class="material-symbols-rounded text-gray-600">attach_file</span>
      </button>
      <input type="text" id="message-input" placeholder="Type a message..." class="flex-1 bg-gray-100 rounded-full px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-red-200"/>
      <button onclick="sendMessage()" class="bg-farmx-red text-white p-3 rounded-full hover:bg-farmx-red-bright transition-colors">
        <span class="material-symbols-rounded text-lg">send</span>
      </button>
    </div>
  </div>
</div>

<script>
const messagesContainer = document.getElementById('messages-container');
const messageInput = document.getElementById('message-input');

// AI Responses
const aiResponses = [
  "That's great! How can I assist you further?",
  "I understand. Let me help you with that.",
  "Based on your question, I recommend checking the Market section for current prices.",
  "Have you considered using our IoT sensors for better crop monitoring?",
  "You can find more information in the Learn section of the app.",
  "Would you like me to connect you with a farming expert?"
];

function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;
  
  // Add user message
  addMessage(text, 'sent');
  messageInput.value = '';
  
  // Simulate AI response
  setTimeout(() => {
    const randomResponse = aiResponses[Math.floor(Math.random() * aiResponses.length)];
    addMessage(randomResponse, 'received');
  }, 1000);
}

function addMessage(text, type) {
  const messageDiv = document.createElement('div');
  messageDiv.className = `chat-message ${type} bg-white p-3 rounded-2xl ${type === 'sent' ? 'rounded-tr-sm' : 'rounded-tl-sm'} shadow-sm border border-gray-100`;
  
  const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  
  messageDiv.innerHTML = `
    <p class="text-sm ${type === 'sent' ? 'text-white' : 'text-gray-700'}" style="${type === 'sent' ? 'background: #b71c1c; padding: 8px; border-radius: 12px;' : ''}">${text}</p>
    <p class="text-[10px] text-gray-400 mt-1">${time}</p>
  `;
  
  messagesContainer.appendChild(messageDiv);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Enter key to send
messageInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    sendMessage();
  }
});
</script>

</body>
</html>
