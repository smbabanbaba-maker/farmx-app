<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FarmX - Agricultural Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        #root {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 932px;
            background: #FFFFFF;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            border-radius: 0;
        }
        
        /* Mobile frame for web */
        @media (min-width: 768px) {
            body {
                background: #1a1a1a;
                padding: 20px;
            }
            #root {
                border-radius: 30px;
                height: 90vh;
                max-height: 800px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            }
        }
        
        /* Loading screen */
        .loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            background: #FFFFFF;
        }
        
        .loading-logo {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .loading-text {
            color: #000000;
            font-size: 24px;
            font-weight: bold;
        }
        
        .loading-sub {
            color: #666666;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .loading-bar {
            width: 200px;
            height: 4px;
            background: #F5F5F5;
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .loading-bar-inner {
            height: 100%;
            background: #FF0000;
            border-radius: 2px;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        /* Theme colors */
        .farmx-red { color: #FF0000; }
        .farmx-black { color: #000000; }
        .farmx-white { background: #FFFFFF; }
    </style>
</head>
<body>
    <div id="root">
        <!-- Loading Screen -->
        <div class="loading" id="loadingScreen">
            <div class="loading-logo">🌾</div>
            <div class="loading-text">FarmX</div>
            <div class="loading-sub">Agricultural Marketplace</div>
            <div class="loading-bar">
                <div class="loading-bar-inner"></div>
            </div>
            <div style="margin-top: 30px; color: #999; font-size: 12px;">
                Loading...
            </div>
        </div>
    </div>

    <!-- React Scripts -->
    <script>
        // Loading simulation
        setTimeout(() => {
            const loading = document.getElementById('loadingScreen');
            if (loading) {
                loading.innerHTML = `
                    <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;background:#FFFFFF;padding:20px;">
                        <div style="font-size:48px;margin-bottom:16px;">🌾</div>
                        <h1 style="color:#000000;font-size:28px;font-weight:bold;">FarmX</h1>
                        <p style="color:#666666;font-size:16px;margin-top:8px;">Agricultural Marketplace</p>
                        <div style="margin-top:30px;padding:16px 32px;background:#FF0000;color:#FFFFFF;border-radius:8px;font-weight:bold;">
                            🚀 App is Ready!
                        </div>
                        <div style="margin-top:20px;color:#999;font-size:12px;">
                            ⚡ Built with React Native + AWS Amplify
                        </div>
                        <div style="margin-top:30px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">
                            <div style="padding:8px 16px;background:#F5F5F5;border-radius:20px;font-size:12px;color:#333;">🏠 Home</div>
                            <div style="padding:8px 16px;background:#F5F5F5;border-radius:20px;font-size:12px;color:#333;">🛒 Market</div>
                            <div style="padding:8px 16px;background:#F5F5F5;border-radius:20px;font-size:12px;color:#333;">💰 Wallet</div>
                            <div style="padding:8px 16px;background:#F5F5F5;border-radius:20px;font-size:12px;color:#333;">💼 Jobs</div>
                            <div style="padding:8px 16px;background:#F5F5F5;border-radius:20px;font-size:12px;color:#333;">👥 Community</div>
                            <div style="padding:8px 16px;background:#F5F5F5;border-radius:20px;font-size:12px;color:#333;">💬 Chat</div>
                            <div style="padding:8px 16px;background:#F5F5F5;border-radius:20px;font-size:12px;color:#333;">👤 Profile</div>
                        </div>
                        <div style="margin-top:30px;padding:12px 24px;border:2px solid #FF0000;border-radius:8px;background:#FFF5F5;">
                            <p style="color:#FF0000;font-size:14px;font-weight:bold;">
                                🎯 Colors: White · Black · Red
                            </p>
                        </div>
                        <div style="margin-top:20px;color:#999;font-size:11px;">
                            ⚡ View on GitHub Pages
                        </div>
                    </div>
                `;
            }
        }, 2000);
    </script>

    <!-- For full React Native app, uncomment these when building -->
    <!-- 
    <script src="./node_modules/expo/AppEntry.js"></script>
    -->
</body>
</html>
