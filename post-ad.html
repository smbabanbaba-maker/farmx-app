<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>FarmX - Post Ad</title>
<meta name="theme-color" content="#b71c1c"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@400,0&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { farmx: { red: '#b71c1c', 'red-bright': '#d32f2f' } },
      fontFamily: { sans: ['Inter', 'sans-serif'] },
      fontWeight: { normal: '400', medium: '500', semibold: '600' }
    }
  }
}
</script>
<style>
body { font-family: 'Inter', sans-serif; background-color: #fafafa; }
.material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.bottom-nav-item.active { color: #b71c1c; }
.bottom-nav-item.active span { font-variation-settings: 'FILL' 1, 'wght' 500; }
.photo-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; }
</style>
</head>
<body class="pb-24 text-gray-700">

<header class="bg-white sticky top-0 z-50 px-4 h-16 flex items-center justify-between border-b border-gray-200">
  <div class="flex items-center gap-3">
    <button class="p-2 rounded-full hover:bg-gray-100" onclick="window.history.back()">
      <span class="material-symbols-rounded text-farmx-red">arrow_back</span>
    </button>
    <h1 class="text-xl font-semibold text-gray-900">Post Ad</h1>
  </div>
  <button class="text-farmx-red text-sm font-medium" onclick="clearForm()">Clear</button>
</header>

<main class="px-4 pt-4 space-y-4">
  <!-- Title -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Title *</label>
    <input type="text" id="ad-title" placeholder="e.g., Grade A Maize - 50kg bag" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-farmx-red focus:ring-2 focus:ring-red-200 outline-none text-sm"/>
  </div>

  <!-- Category -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Category *</label>
    <select id="ad-category" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-farmx-red focus:ring-2 focus:ring-red-200 outline-none text-sm bg-white">
      <option value="">Select Category</option>
      <option value="crops">Crops</option>
      <option value="livestock">Livestock</option>
      <option value="equipment">Equipment</option>
      <option value="seeds">Seeds</option>
      <option value="fertilizer">Fertilizer</option>
    </select>
  </div>

  <!-- Photos -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Photos *</label>
    <div class="flex gap-3 overflow-x-auto pb-2">
      <label class="w-20 h-20 bg-gray-100 rounded-xl flex flex-col items-center justify-center cursor-pointer flex-shrink-0 border-2 border-dashed border-gray-300">
        <span class="material-symbols-rounded text-farmx-red text-3xl">add_a_photo</span>
        <input type="file" accept="image/*" multiple class="hidden" onchange="handlePhotoUpload(event)"/>
      </label>
      <div id="photo-previews" class="flex gap-3"></div>
    </div>
    <p class="text-xs text-gray-500 mt-1">Max 5 photos, 5MB each</p>
  </div>

  <!-- Price -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Price (₦) *</label>
    <input type="number" id="ad-price" placeholder="e.g., 45000" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-farmx-red focus:ring-2 focus:ring-red-200 outline-none text-sm"/>
  </div>

  <!-- Description -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Description *</label>
    <textarea id="ad-description" rows="4" placeholder="Describe your product..." class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-farmx-red focus:ring-2 focus:ring-red-200 outline-none text-sm resize-none"></textarea>
  </div>

  <!-- Location -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Location *</label>
    <input type="text" id="ad-location" placeholder="e.g., Kano, Nigeria" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-farmx-red focus:ring-2 focus:ring-red-200 outline-none text-sm"/>
  </div>

  <!-- Payment Method -->
  <div class="bg-red-50 border border-red-200 rounded-2xl p-4">
    <h3 class="text-sm font-semibold text-gray-900 mb-3">Payment Method</h3>
    <div class="space-y-2">
      <label class="flex items-center gap-3 p-3 bg-white rounded-xl border border-gray-200 cursor-pointer">
        <input type="radio" name="payment" value="wallet" class="text-farmx-red" checked/>
        <div class="w-10 h-10 bg-farmx-red/10 rounded-xl flex items-center justify-center">
          <span class="material-symbols-rounded text-farmx-red">account_balance_wallet</span>
        </div>
        <div class="flex-1">
          <p class="text-sm font-medium">From Wallet</p>
          <p class="text-xs text-gray-500">Balance: ₦2,450,000</p>
        </div>
      </label>
      <label class="flex items-center gap-3 p-3 bg-white rounded-xl border border-gray-200 cursor-pointer">
        <input type="radio" name="payment" value="card" class="text-farmx-red"/>
        <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center">
          <span class="material-symbols-rounded text-blue-600">credit_card</span>
        </div>
        <div class="flex-1">
          <p class="text-sm font-medium">Debit Card</p>
          <p class="text-xs text-gray-500">Visa, Mastercard</p>
        </div>
      </label>
      <label class="flex items-center gap-3 p-3 bg-white rounded-xl border border-gray-200 cursor-pointer">
        <input type="radio" name="payment" value="transfer" class="text-farmx-red"/>
        <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center">
          <span class="material-symbols-rounded text-green-600">swap_horiz</span>
        </div>
        <div class="flex-1">
          <p class="text-sm font-medium">Bank Transfer</p>
          <p class="text-xs text-gray-500">Any Nigerian bank</p>
        </div>
      </label>
    </div>
  </div>
</main>

<!-- Fixed Bottom Buttons -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 space-y-2 z-50">
  <button onclick="postAd()" class="w-full bg-farmx-red text-white py-3.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform">Post Ad</button>
  <button onclick="saveDraft()" class="w-full border-2 border-farmx-red text-farmx-red py-3.5 rounded-xl font-semibold active:scale-95 transition-transform">Save as Draft</button>
</div>

<script>
let uploadedPhotos = [];

function handlePhotoUpload(event) {
  const files = event.target.files;
  const previewContainer = document.getElementById('photo-previews');
  
  for (let file of files) {
    if (uploadedPhotos.length >= 5) {
      alert('Maximum 5 photos allowed');
      break;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
      uploadedPhotos.push(e.target.result);
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'photo-preview';
      previewContainer.appendChild(img);
    };
    reader.readAsDataURL(file);
  }
}

function postAd() {
  const title = document.getElementById('ad-title').value;
  const price = document.getElementById('ad-price').value;
  const category = document.getElementById('ad-category').value;
  
  if (!title || !price || !category) {
    alert('Please fill all required fields');
    return;
  }
  
  const ad = {
    id: Date.now(),
    title,
    price: parseInt(price),
    category,
    description: document.getElementById('ad-description').value,
    location: document.getElementById('ad-location').value,
    photos: uploadedPhotos,
    date: new Date().toISOString(),
    seller: 'Current User'
  };
  
  const ads = JSON.parse(localStorage.getItem('farmx_ads') || '[]');
  ads.push(ad);
  localStorage.setItem('farmx_ads', JSON.stringify(ads));
  
  // Create notification
  const notifications = JSON.parse(localStorage.getItem('farmx_notifications') || '[]');
  notifications.unshift({
    type: 'ad_posted',
    title: 'Ad Posted Successfully',
    message: `Your ad "${title}" is now live`,
    time: new Date().toISOString(),
    read: false
  });
  localStorage.setItem('farmx_notifications', JSON.stringify(notifications));
  
  alert('Ad posted successfully!');
  window.location.href = '/market.html';
}

function saveDraft() {
  alert('Draft saved!');
}

function clearForm() {
  if (confirm('Clear all fields?')) {
    document.querySelectorAll('input, textarea, select').forEach(el => el.value = '');
    document.getElementById('photo-previews').innerHTML = '';
    uploadedPhotos = [];
  }
}
</script>

</body>
</html>
